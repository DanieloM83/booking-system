<div class="col-lg-4 mb-4">
  <div class="card room-card shadow-sm h-100">
    <img src="https://picsum.photos/600/400" class="card-img-top" />

    <div class="card-body">
      <h4>{{ room.name }}</h4>

      <p>
        Capacity:
        <strong>{{ room.capacity }}</strong>
      </p>

      <p>
        Price:
        <strong>${{ room.price }}</strong>
      </p>

      <a href="/detail/{{ room.id }}" class="btn btn-outline-primary">
        Details
      </a>
    </div>
  </div>
</div>
