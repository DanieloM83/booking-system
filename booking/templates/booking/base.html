<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{% block title %}Hotel Booking{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f8f9fa;
      }

      .hero {
        min-height: 70vh;
        background: url("https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1600&q=80");
        background-size: cover;
        background-position: center;
        position: relative;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
      }

      .hero-content {
        position: relative;
        z-index: 1;
        color: white;
      }

      .room-card {
        transition: 0.2s;
      }

      .room-card:hover {
        transform: translateY(-4px);
      }
    </style>
  </head>
  <body>
    {% include "booking/includes/navbar.html" %} 
    {% block content %} 
    
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
